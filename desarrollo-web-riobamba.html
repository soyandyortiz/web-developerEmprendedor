  <head>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

      property="twitter:url"

    />

      content="Diseño y desarrollo de sitios web profesionales y personalizados en Riobamba. Configura tu presupuesto online."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logotipo.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              antigravity: {
                bg: "#0a0a0a",
                violet: "#8b5cf6", // A500 range, tweak for neon
                cyan: "#06b6d4", // Cyan range
                dark: "#111111",
                panel: "#1a1a1a",
              },
            },
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
            boxShadow: {
              "neon-violet":
                "0 0 10px rgba(139, 92, 246, 0.5), 0 0 20px rgba(139, 92, 246, 0.3)",
              "neon-cyan":
                "0 0 10px rgba(6, 182, 212, 0.5), 0 0 20px rgba(6, 182, 212, 0.3)",
            },
            animation: {
              "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              float: "float 6s ease-in-out infinite",
              "fade-in-up": "fadeInUp 0.8s ease-out forwards",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-20px)" },
              },
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/src/styles/global.css" />

    <!-- Icons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="relative min-h-screen bg-antigravity-dark text-white font-body selection:bg-antigravity-cyan selection:text-black flex flex-col"
  >
    <!-- Header Component -->
    <load src="src/components/Header.html" />

    <!-- Hero Section -->
    <section
      class="relative pt-40 pb-20 px-6 min-h-[60vh] flex flex-col items-center justify-center text-center"
    >
      <div class="max-w-4xl mx-auto space-y-8 relative z-10">
        <!-- Badge -->
        <div
          class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-mono text-antigravity-cyan uppercase tracking-wider mb-2 backdrop-blur-md animate-fade-in-up"
        >
          <span
            class="w-2 h-2 rounded-full bg-antigravity-cyan animate-pulse"
          ></span>
          Web Design & Development
        </div>

        <!-- Title -->
        <h1
          class="font-display font-bold text-5xl md:text-7xl leading-tight text-white drop-shadow-2xl animate-fade-in-up"
          style="animation-delay: 0.1s"
        >
          Desarrollo Web Profesional <br />
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-antigravity-violet to-antigravity-cyan text-3xl md:text-5xl font-light block mt-4"
            >– Riobamba, Ecuador</span
          >
        </h1>

        <!-- Subtitle -->
        <p
          class="text-gray-300 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed animate-fade-in-up"
          style="animation-delay: 0.2s"
        >
          Diseñamos tu sitio web a medida. Completa el formulario interactivo y
          recibe tu presupuesto inmediato.
        </p>

        <div class="animate-fade-in-up" style="animation-delay: 0.3s">
          <button
            onclick="startConfigurator()"
            id="start-configurator-btn"
            class="group relative px-10 py-5 bg-antigravity-violet text-white font-bold rounded-full transition-all duration-300 hover:shadow-[0_0_30px_rgba(139,92,246,0.6)] hover:-translate-y-1 overflow-hidden"
          >
            <div
              class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"
            ></div>
            <span
              class="relative z-10 flex items-center justify-center gap-3 text-lg"
            >
              Configurar mi sitio web
              <svg
                class="w-5 h-5 text-white/70 group-hover:text-white transition-colors"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 14l-7 7m0 0l-7-7m7 7V3"
                ></path>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </section>

    <!-- Empty Container for Configurator -->
    <section class="flex-grow px-6 pb-24 relative z-10">
      <div
        id="configurador-web"
        class="max-w-5xl mx-auto transition-all duration-500 min-h-0"
      >
        <!-- The Javascript will render the wizard here -->
        <div
          class="text-center text-gray-500 py-20 hidden"
          id="configurator-placeholder"
        >
          <i
            class="bx bx-loader-alt bx-spin text-4xl mb-4 text-antigravity-cyan"
          ></i>
          <p>Cargando configurador...</p>
        </div>
      </div>
    </section>

    <!-- Footer Component -->
    <load src="src/components/Footer.html" />

    <!-- Modals -->
    <load src="src/components/LegalModals.html" />

    <!-- Scripts -->
    <script type="module" src="/src/assets/js/animations.js"></script>
    <script type="module" src="/src/assets/js/main.js"></script>
    <script type="module" src="/src/assets/js/package-helpers.js"></script>
    <script type="module" src="/src/assets/js/web-configurator.js"></script>
    <script type="module" src="/src/assets/js/active-menu.js"></script>
    <script type="module" src="/src/assets/js/particles.js"></script>
  </body>
</html>
