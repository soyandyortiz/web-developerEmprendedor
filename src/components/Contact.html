<section id="contacto" class="py-24 px-6 relative">
  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16">
    <!-- Formulario -->
    <div>
      <h2 class="font-display font-bold text-4xl text-white mb-6">
        Contáctanos
      </h2>
      <p class="text-gray-400 mb-8">
        Déjanos tus datos y nos pondremos en contacto contigo.
      </p>
      <form id="contactForm" class="space-y-6" onsubmit="sendToWhatsApp(event)">
        <input
          type="text"
          id="name"
          placeholder="Nombres Completos"
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-antigravity-cyan transition-colors"
          required
        />
        <input
          type="email"
          id="email"
          placeholder="Correo Electrónico"
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-antigravity-cyan transition-colors"
          required
        />
        <div class="relative">
          <select
            id="service"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-antigravity-cyan transition-colors cursor-pointer"
            required
          >
            <option
              value=""
              disabled
              selected
              class="bg-antigravity-dark text-gray-500"
            >
              Selecciona un servicio
            </option>
            <option value="Desarrollo Web" class="bg-antigravity-dark">
              Desarrollo Web
            </option>
            <option
              value="Aplicativos Web a Medida"
              class="bg-antigravity-dark"
            >
              Aplicativos Web a Medida
            </option>
            <option
              value="Branding y Diseño Gráfico"
              class="bg-antigravity-dark"
            >
              Branding y Diseño Gráfico
            </option>
            <option
              value="Gestión de Hosting y Dominios"
              class="bg-antigravity-dark"
            >
              Gestión de Hosting y Dominios
            </option>
            <option
              value="Integración de Pagos (Ecuador)"
              class="bg-antigravity-dark"
            >
              Integración de Pagos (Ecuador)
            </option>
            <option value="Correo Corporativo" class="bg-antigravity-dark">
              Correo Corporativo
            </option>
            <option
              value="Marketing Digital y Redes"
              class="bg-antigravity-dark"
            >
              Marketing Digital y Redes
            </option>
          </select>
          <div
            class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none"
          >
            <svg
              class="w-4 h-4 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              ></path>
            </svg>
          </div>
        </div>
        <textarea
          id="message"
          rows="4"
          placeholder="Cuéntanos sobre tu proyecto..."
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-antigravity-cyan transition-colors"
          required
        ></textarea>
        <button
          type="submit"
          class="w-full py-4 rounded-xl bg-antigravity-violet text-white font-bold hover:bg-violet-600 transition-colors shadow-lg shadow-violet-500/20"
        >
          Enviar a WhatsApp
        </button>
      </form>
    </div>

    <!-- Información y Mapa -->
    <div class="space-y-8">
      <div
        class="bg-antigravity-panel/50 p-8 rounded-3xl border border-white/5"
      >
        <h3 class="text-2xl font-bold text-white mb-6">
          Información de Contacto
        </h3>
        <ul class="space-y-6">
          <li class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-antigravity-cyan/10 flex items-center justify-center text-antigravity-cyan"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                ></path>
              </svg>
            </div>
            <div>
              <p class="text-gray-400 text-sm">Teléfono</p>
              <p class="text-white font-medium">+593 98 265 0929</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-antigravity-violet/10 flex items-center justify-center text-antigravity-violet"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
            </div>
            <div>
              <p class="text-gray-400 text-sm">Correo Electrónico</p>
              <p class="text-white font-medium">guambraweb@gmail.com</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-full bg-pink-500/10 flex items-center justify-center text-pink-500"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                ></path>
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                ></path>
              </svg>
            </div>
            <div>
              <p class="text-gray-400 text-sm">Dirección</p>
              <p class="text-white font-medium">Riobamba, Ecuador</p>
              <p class="text-gray-500 text-xs">Sector Redondel del Libro</p>
            </div>
          </li>
        </ul>
        <div class="mt-8 pt-8 border-t border-white/10">
          <h4 class="text-white font-bold mb-4">Síguenos</h4>
          <div class="flex gap-4">
            <!-- Placeholder Social Icons -->
            <a
              href="#"
              class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:bg-antigravity-cyan hover:text-white transition-all"
              ><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.046V9.43c0-3.007 1.791-4.668 4.533-4.668 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
                /></svg
            ></a>
            <a
              href="#"
              class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:bg-pink-500 hover:text-white transition-all"
              ><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0z"
                /></svg
            ></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
